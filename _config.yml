layout: sidebar
style: light

plugins:
  - jekyll-octicons
  - jekyll-github-metadata
  - jekyll-sitemap
  - jemoji

permalink: /:year/:month/:day/:title/

defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
      type: "posts"
    values:
      layout: "post"

projects:
  sort_by: pushed
  # sort_by options:
  #   - pushed
  #   - stars
  limit: 9
  exclude:
    archived: false
    forks: true
    projects:
    # - repo-name

social_media:
#   behance: your_username
#   dribbble: your_username
#   facebook: your_username
#   hackerrank: your_username
   instagram: achmad.din
#   keybase: your_username
   linkedin: achmadfachrudin
#   mastodon: your_username
   medium: achmadfachrudin
#   stackoverflow: your_user_id
#   telegram: your_username
   twitter: achmadbook
#   unsplash: your_username
#   vk: your_username
#   website: http://your_website_url
#   youtube: your_username

topics:
  - name: Android
    web_url: https://www.android.com
    image_url: https://www.gstatic.com/devrel-devsite/vbb62cc5a3e8f17e37bae4792b437f28f787df3f9cf9732cbfcc99b4f4ff41a54/android/images/rebrand/lockup.svg

  - name: Kotlin
    web_url: https://kotlinlang.org
    image_url: https://developer.android.com/images/landing/kotlin-logo.svg?hl=ID
